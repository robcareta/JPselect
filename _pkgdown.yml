url: https://robcareta.github.io/JPselect/

template:
  package: somatemplate
  bootstrap: 5

home:
  title: "JPselect: Just-Pope Production Functions with Heckman Selectivity"
  description: >
    Three-step estimation of Just-Pope stochastic production functions with
    sample-selection correction. Runs the corrected and uncorrected specifications
    side by side so the bias in risk-function coefficients is visible directly.
  links:
  - text: Report an issue
    href: https://github.com/robcareta/JPselect/issues

navbar:
  structure:
    left:  [reference, articles, news]
    right: [search, github]

reference:
- title: Package overview
  contents:
  - JPselect-package

- title: Full pipeline
  desc: Wrappers for the complete three-step procedure with vs. without selectivity correction.
  contents:
  - jp_fit
  - jp_compare

- title: S3 methods
  desc: Extracting coefficients and plotting fitted objects.
  contents:
  - plot.jpfit
  - coef.jpfit

- title: Individual stages
  desc: The estimation steps exposed for finer control.
  contents:
  - estimate_selection
  - estimate_mean_function
  - estimate_risk_function

- title: Export
  desc: Write results to Excel, LaTeX, or CSV for papers and slides.
  contents:
  - jp_export

- title: Example and reference data
  desc: Synthetic and packaged datasets used for demonstration.
  contents:
  - simulate_kiti_data
  - prepare_caf_data
  - caf2021_docs
  - caf2021_g2_groups

authors:
  Roberto Cardenas Retamal:
    href: https://robcareta.github.io
